server {
    listen 80;
    server_name 186.246.4.178;
    root /var/www/aegis;
    index index.html;
    client_max_body_size 200M;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # PDF книг — с буферизацией и поддержкой Range (частичная загрузка).
    # Отдельный location, чтобы proxy_buffering off (нужный для SSE) не мешал Range.
    location ~ ^/api/books/\d+/pdf$ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Range-запросы требуют передачи заголовка Range и буферизации ответа
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;
        proxy_buffering on;
        proxy_read_timeout 300s;
    }

    # Остальное API — без буферизации (для streaming AI / SSE)
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 300s;
    }
}
